# Sæt denne til at køre efter historik tabellerne er opdateret
rc.attestation.attestation_cron=0 0 0 * * *
# Sæt denne til en gang i døgnet gerne lige efter midnat
rc.attestation.attestation_cache_ttl_cron=10 * * * * *
# Afsendelse af attesterings notifikationer
rc.attestation.attestation_notifications_cron=30 0 0 * * *

rc.attestation.days_for_attestation=31
rc.attestation.notify_days_before_deadline=20
rc.attestation.reminder1_days_before_deadline=10
rc.attestation.reminder2_days_before_deadline=3
rc.attestation.escalation_reminder_days_after_deadline=5

# cron for adding dirty AD groups: kl. 10 og 14 på week days
rc.cron.add_dirty_ad_groups=0 0 10,14 * * MON-FRI
# cron for adding dirty AD groups for assignments with start today: 6 am every day
rc.cron.add_dirty_ad_groups_with_start_date=0 0 6 ? * *

# cron for the manual it system role assignment full sweep: nightly safety-net that bootstraps the
# baseline, cleans up rows for deleted users and recovers from any lost change-events. Second and
# minute are randomized (SpEL) within the 02:00 hour so customers don't all run at the same time
rc.cron.manual_it_system_task=#{new java.util.Random().nextInt(60)} #{new java.util.Random().nextInt(60)} 2 * * *
# cron for the manual it system pending-user flush: cheap, processes only users whose assignments
# changed since the last run (marked by ManualRolesUserAssignmentsChangedListener). Runs around the
# clock every ten minutes - it is a no-op when nothing changed, so there is no reason to limit it to
# weekday business hours. Second and minute-offset are randomized (SpEL) so customers don't all run
# at the same time
rc.cron.manual_it_system_pending_task=#{new java.util.Random().nextInt(55)} #{new java.util.Random().nextInt(10)}/10 * * * *

