<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header}"></head>
<body class="layout-fixed">
<div class="wrapper">
	<header th:replace="~{fragments/navbar :: navbar-header(subpage = 'administration')}"></header>
	<aside th:replace="~{fragments/navbar :: navbar-aside (subpage = 'administration')}"></aside>

	<section>
		<div class="content-wrapper">
			<div style="margin-bottom: 15px;">
				<a th:href="@{/ui/admin/mailtemplates}" class="btn btn-default">
					<i class="fa fa-arrow-left"></i> <span th:text="#{html.page.email_template.edit.back}">Tilbage til oversigt</span>
				</a>
			</div>

			<h3 th:text="${template.templateTypeName}"></h3>

			<div class="panel panel-default">
				<div class="panel-heading"></div>
				<div class="panel-body">
					<div class="row">
						<div class="col-lg-12">
							<form class="form-horizontal" id="templateForm">
								<input type="hidden" name="id" th:value="${template.id}"/>
								<input type="hidden" name="enabled" th:value="${template.enabled}" />

								<div class="form-group">
									<label class="col-sm-2 control-label" th:text="#{html.entity.email_template.enabled}"></label>
									<div class="col-sm-8">
										<div class="checkbox c-checkbox">
											<label>
												<input id="checkboxEnabled" th:checked="${template.enabled}" type="checkbox" />
												<span class="fa fa-check"></span>
											</label>
										</div>
									</div>
								</div>

								<th:block th:if="${template.allowDaysBeforeEventFeature}">
									<div class="form-group">
										<label class="col-sm-2 control-label">
											<span th:text="#{html.entity.email_template.days_before_event}"></span><br/>
											<small th:text="#{html.entity.email_template.days_before_event.hint}"></small>
										</label>
										<div class="col-sm-8">
											<div class="row">
												<div class="col-sm-2">
													<input name="daysBeforeEvent" type="number" min="-30" max="30" step="1" class="form-control" th:value="${template.daysBeforeEvent}"/>
												</div>
												<div class="col-sm-2">
													<p class="form-control-static">(fra -30 til +30 dage)</p>
												</div>
											</div>
										</div>
									</div>
								</th:block>

								<div class="form-group">
									<label class="col-sm-2 control-label" th:text="#{html.entity.email_template.name}"></label>
									<div class="col-sm-8">
										<input name="title" th:value="${template.title}" class="form-control" />
									</div>
								</div>

								<div class="form-group">
									<label class="col-sm-2 control-label" th:text="#{html.entity.email_template.message}"></label>
									<div class="col-sm-8">
										<textarea name="message" th:text="${template.message}" class="mb-0 preformat" rows="10" style="width:100%;"></textarea>
									</div>
								</div>

								<th:block th:if="${template.hasRepeatingPart}">
									<div class="form-group">
										<label class="col-sm-2 control-label">
											<span th:text="#{html.entity.email_template.repeating_part}"></span><br/>
											<small th:text="#{html.entity.email_template.repeating_part.hint}"></small>
										</label>
										<div class="col-sm-8">
											<textarea name="repeatingPart" th:text="${template.repeatingPart}" class="mb-0 form-control preformat" rows="3" style="width:100%;"></textarea>
										</div>
									</div>
								</th:block>

								<th:block th:if="${template.hasNestedRepeatingPart}">
									<div class="form-group">
										<label class="col-sm-2 control-label">
											<span th:text="#{html.entity.email_template.nested_repeating_part}"></span><br/>
											<small th:text="#{html.entity.email_template.nested_repeating_part.hint}"></small>
										</label>
										<div class="col-sm-8">
											<textarea name="nestedRepeatingPart" th:text="${template.nestedRepeatingPart}" class="mb-0 form-control preformat" rows="3" style="width:100%;"></textarea>
										</div>
									</div>
								</th:block>

								<div class="form-group">
									<label class="col-sm-2 control-label" th:text="#{html.entity.email_template.notes}"></label>
									<div class="col-sm-8">
										<textarea name="notes" th:text="${template.notes}" class="mb-0 form-control" rows="3" style="width:100%;"></textarea>
									</div>
								</div>

								<div class="form-group">
									<div class="col-sm-offset-2 col-sm-10">
										<button type="button" style="margin-right: 5px;" class="btn btn-lg btn-primary col-xs-2" id="buttonSubmit" th:text="#{html.control.button.save}"></button>
										<button type="button" style="margin-right: 5px;" class="btn btn-lg btn-warning col-xs-2" id="buttonTest" th:text="#{html.page.email_template.test}"></button>
									</div>
								</div>

								<div class="form-group">
									<div class="col-sm-offset-2 col-sm-8">
										<h4 th:text="#{html.entity.email_template.placeholders}"></h4>
										<p th:text="#{html.entity.email_template.placeholders.intro}"></p>
										<table class="table">
											<thead>
											<tr>
												<th th:text="#{html.entity.email_template.placeholders.placeholder}" style="width: 250px;"/>
												<th th:text="#{html.entity.email_template.placeholders.description}"/>
											</tr>
											</thead>
											<tbody>
											<tr th:each="placeholder : ${template.emailTemplatePlaceholders}">
												<td th:text="${placeholder.placeholder}"/>
												<td class="preformat" th:text="#{${placeholder.description}}"/>
											</tr>
											</tbody>
										</table>
									</div>
								</div>

								<div class="form-group" th:if="${template.hasRepeatingPart}">
									<div class="col-sm-offset-2 col-sm-8">
										<h4 th:text="#{html.entity.email_template.placeholders.repeating_part}"></h4>
										<table class="table">
											<thead>
											<tr>
												<th th:text="#{html.entity.email_template.placeholders.placeholder}" style="width: 250px;"/>
												<th th:text="#{html.entity.email_template.placeholders.description}"/>
											</tr>
											</thead>
											<tbody>
											<tr th:each="placeholder : ${template.repeatingPartPlaceholders}">
												<td th:text="${placeholder.placeholder}"/>
												<td class="preformat" th:text="#{${placeholder.description}}"/>
											</tr>
											</tbody>
										</table>
									</div>
								</div>

								<div class="form-group" th:if="${template.hasNestedRepeatingPart}">
									<div class="col-sm-offset-2 col-sm-8">
										<h4 th:text="#{html.entity.email_template.placeholders.nested_repeating_part}"></h4>
										<table class="table">
											<thead>
											<tr>
												<th th:text="#{html.entity.email_template.placeholders.placeholder}" style="width: 250px;"/>
												<th th:text="#{html.entity.email_template.placeholders.description}"/>
											</tr>
											</thead>
											<tbody>
											<tr th:each="placeholder : ${template.nestedRepeatingPartPlaceholders}">
												<td th:text="${placeholder.placeholder}"/>
												<td class="preformat" th:text="#{${placeholder.description}}"/>
											</tr>
											</tbody>
										</table>
									</div>
								</div>
							</form>
						</div>
					</div>
				</div>
			</div>
		</div>
	</section>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>

<script th:inline="javascript">
	/*<![CDATA[*/

	/*[+
		var restUrl = [[@{/rest/mailtemplates}]];
		var listUrl = [[@{/ui/admin/mailtemplates}]];
		var msgSuccess = [[#{html.page.email_template.success}]];
		var msgFail = [[#{html.page.email_template.failure}]];

		var swalImageOk = [[#{html.button.ok}]];
		var swalImageTitle = [[#{html.page.email_template.swal.image.title}]];
		var swalImageText = [[#{html.page.email_template.swal.image.text}]];
	+]*/

		var token = $("meta[name='_csrf']").attr("content");

		$(document).ready(function () {
			// the message is edited with the full WYSIWYG editor (pictures, links). the repeating parts
			// are content-only fragments - their list structure (<ul>/<li>) is applied by the renderer -
			// so they get a reduced toolbar (codeview still lets a technical admin edit the raw html).
			$('textarea[name="message"]').summernote({
				"height": 320,
				"toolbar": [
					[ "font", [ "bold", "italic", "underline" ]],
					[ "para", [ "ul", "ol" ]],
					[ "insert", [ "picture", "link" ]],
					[ "view", [ "codeview" ] ]
				],
				maximumImageFileSize: 100*1024,
				callbacks: {
					onImageUploadError: function(msg) {
						swal({
							title: swalImageTitle,
							text: swalImageText,
							confirmButtonColor : "#4765a0",
							confirmButtonText : swalImageOk
						});
					}
				},
				dialogsInBody: true
			});

			$('textarea[name="repeatingPart"], textarea[name="nestedRepeatingPart"]').summernote({
				"height": 150,
				"toolbar": [
					[ "font", [ "bold", "italic", "underline" ]],
					[ "view", [ "codeview" ] ]
				],
				dialogsInBody: true
			});

			$('#checkboxEnabled').on('change', function() {
				$("input[name=enabled]").val(this.checked);
			});

			$('#buttonSubmit').on('click', function() {
				var data = getFormData($('#templateForm'));
				save(data, false);
			});

			$('#buttonTest').on('click', function() {
				var data = getFormData($('#templateForm'));
				save(data, true);
			});
		});

		function getFormData(oForm) {
			var unindexed_array = oForm.serializeArray();
			var indexed_array = {};

			$.map(unindexed_array, function(n, i){
				indexed_array[n['name']] = n['value'];
			});

			return indexed_array;
		}

		function save(payload, tryEmail) {
			$.ajax({
				method : "POST",
				url: restUrl + "?tryEmail=" + tryEmail,
				headers: {
					"content-type": "application/json",
					'X-CSRF-TOKEN': token
				},
				data: JSON.stringify(payload)
			}).done(function(data) {
				if (data != '') {
					$.notify({ message: data }, { status: 'success', autoHideDelay: 2000 });
				} else {
					$.notify({ message: msgSuccess }, { status: 'success', autoHideDelay: 2000 });
				}
			}).fail(errorHandler(msgFail));
		}

	/*]]>*/
</script>
</body>
</html>
