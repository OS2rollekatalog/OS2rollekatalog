<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{requestmodule/fragments/header :: header(datatables = true)}"></head>
<body class="top-navigation layout-fixed">
<div id="wrapper">
    <div id="page-wrapper" class="gray-bg">
        <div th:replace="~{requestmodule/fragments/topbar :: topbar(page = 'pendingRequests')}"></div>
        <div class="wrapper wrapper-content">
            <div class="row">
                <div class="col-lg-12">
                    <div class="ibox">
                        <div class="ibox-title">
                            <h3>
                                <em class="fa fa-list"></em> &nbsp
                                <span th:text="#{requestmodule.html.pending.title}"></span>
                            </h3>

                        </div>

                        <div class="ibox-content">
                            <table id="pendingRequestTable"
                                   class="table table-striped table-bordered table-hover">
                                <thead>
                                <tr >
                                    <!-- <th></th> -->
                                    <th th:text="#{requestmodule.html.pending.table.header.reciever}"></th>
                                    <th th:text="#{requestmodule.html.pending.table.header.action}"></th>
                                    <th th:text="#{requestmodule.html.pending.table.header.requester}"></th>
                                    <th th:text="#{requestmodule.html.pending.table.header.rolename}"></th>
                                    <th th:text="#{requestmodule.html.pending.table.header.system}"></th>
                                    <th th:text="#{requestmodule.html.pending.table.header.description}"></th>
                                    <th th:text="#{requestmodule.html.pending.table.header.constraints}"></th>
                                    <th th:text="#{requestmodule.html.pending.table.header.requestdate}"></th>
                                    <th th:text="#{requestmodule.html.pending.table.header.time}"></th>
                                    <th th:text="#{requestmodule.html.pending.table.header.reason}"></th>
                                    <th th:text="#{requestmodule.html.pending.table.header.responsible}"></th>
                                    <th th:text="#{requestmodule.html.pending.table.header.approver}"></th>
                                    <th th:text="#{html.navbar.actions}"></th>
                                </tr>
                                </thead>

                                <tbody>
                                <tr th:each="request : ${pendingRequests}" th:id="${request.id+'_pending_request'}" class="dt-control">
                                    <!-- <td class="dt-control"></td> -->
                                    <td th:text="${request.receiver}"></td>
                                    <td th:text="#{__${request.action}__}"></td>
                                    <td th:text="${request.requester}"></td>
                                    <td th:text="${request.roleName}"></td>
                                    <td th:text="${request.itSystem}"></td>
                                    <td class="preformat" th:text="${request.description}"></td>
                                    <td th:text="${request.constraints}"></td>
                                    <td th:text="${request.requestDate}"></td>
                                    <td th:text="${request.timeFrame}"></td>
                                    <td th:text="${request.reason}"></td>
                                    <td class="treatedByResponsibleField" th:text="${request.assignedTo}"></td>
                                    <td th:text="${request.approver}"></td>
                                    <td>
										<button class="btn btn-info assignBtn" style="width: 100%; margin-bottom: 5px;"
												th:data-assignedname="${request.assignedTo}"
												th:data-requestid="${request.id}"
												th:text="#{requestmodule.html.pending.table.details.assign}"></button>
										<button class="btn btn-primary approveBtn" style="width: 100%"
												th:data-assignedname="${request.assignedTo}"
												th:data-requestid="${request.id}" th:data-chooseanotherenddate="${false}"
												th:data-assignedto="${request.assignedTo}"
												th:text="#{requestmodule.html.pending.table.details.approve} + ' ' + ${#strings.toLowerCase(#messages.msg(request.action))}"></button>

										<button class="btn btn-primary approveBtn" style="width: 100%; margin-top: 5px;"
												th:data-requestid="${request.id}" th:data-chooseanotherenddate="${true}"
												th:data-assignedto="${request.assignedTo}"
												th:text="#{requestmodule.html.pending.table.details.approve.time}"></button>
										<button class="btn btn-danger" style="width: 100%; margin-top: 5px;" th:attr="onclick='onDenyPressed('+${request.id}+');'" th:text="#{requestmodule.html.pending.table.details.deny}"></button>
									</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{requestmodule/fragments/footer :: scripts(datatables = true)}"></div>

<div class="modal fade" id="dateModal" tabindex="-1">
	<div class="modal-dialog">
		<div class="modal-content">
			<div class="modal-header">
				<h4 class="modal-title" id="dateModalTitle"></h4>
				<button type="button" class="close" data-dismiss="modal">&times;</button>
			</div>
			<div class="modal-body">
				<div class="form-group">
					<label id="dateModalLabel"></label>
					<input type="date" class="form-control" id="modalDateInput">
				</div>
			</div>
			<div class="modal-footer">
				<button type="button" class="btn btn-default" data-dismiss="modal" id="dateModalCancelBtn"></button>
				<button type="button" class="btn btn-primary" id="confirmDateBtn"></button>
			</div>
		</div>
	</div>
</div>

<div id="pending-request-data"
	 th:data-current-user-name="${currentUserName}"
	 th:data-assign-warning-title="#{requestmodule.html.pending.table.details.assign.warning.title}"
	 th:data-assign-warning-text="#{requestmodule.html.pending.table.details.assign.warning.text}"
	 th:data-assign-warning-text-two="#{requestmodule.html.pending.table.details.assign.warning.text.two}"
	 th:data-assign-warning-confirm="#{requestmodule.html.pending.table.details.assign.warning.confirm}"
	 th:data-assign-warning-cancel="#{requestmodule.html.pending.table.details.assign.warning.cancel}"
	 style="display: none;">
</div>

        let swalNewDateText = [[#{requestmodule.html.pending.table.details.approve.time.new}]];
    +]*/
    /*]]>*/
</script>
<script th:src="@{/js/rolerequest/pendingRequests/pending.js}"></script>
</body>
</html>
