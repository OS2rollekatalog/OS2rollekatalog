<div th:fragment="index_tabcontent" class="panel-body" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

    <h3 th:text="#{attestationmodule.html.dashboard.orgunits}" th:unless="${#lists.isEmpty(orgUnits)}"></h3>
    <div class="table-responsive" th:unless="${#lists.isEmpty(orgUnits)}">
        <table th:id="${'dashboardOrgUnits_' + runId}" th:class="${'dashboardTable_' + runId + ' table table-striped table-bordered table-hover'}" style="padding-right:0px !important;">
            <thead>
                <tr>
                    <th th:text="#{attestationmodule.html.dashboard.orgunits.name}"></th>
                    <th th:text="#{attestationmodule.html.dashboard.orgunits.substitutes}"></th>
                    <th class="progressColumn" th:text="#{attestationmodule.html.dashboard.status}" style="max-width: 40em"></th>
                    <th class="dateColumn" th:text="#{attestationmodule.html.dashboard.deadline}"></th>
                    <th class="actionColumn" th:text="#{html.control.operations}"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="orgUnit : ${orgUnits}">
                    <td th:text="${orgUnit.name}"></td>
                    <td>
                        <ul style="padding-left: 15px;">
                            <li th:each="substitute : ${orgUnit.substitutes}" th:text="${substitute}"></li>
                        </ul>
                    </td>
                    <td>
                        <div class="row">
                            <div class="col-lg-12">
                                <p th:if="${orgUnit.verifiedAt != null || (orgUnit.orgUnitNumberToAttestate == 0 && orgUnit.numberToAttestate == 0)}" th:text="#{attestationmodule.html.dashboard.completed}"></p>
                                <p th:if="${orgUnit.verifiedAt == null && (orgUnit.orgUnitNumberToAttestate != 0 || orgUnit.numberToAttestate != 0)}">
                                    <span th:if="${orgUnit.numberToAttestate != 0}" th:text="|Mangler attestering for ${orgUnit.numberToAttestate} medarbejdere|"></span>
                                    <span th:if="${orgUnit.orgUnitNumberToAttestate != 0}" th:text="${orgUnit.numberToAttestate != 0} ? | og ${orgUnit.orgUnitNumberToAttestate} enheder| : |Mangler attestering for ${orgUnit.orgUnitNumberToAttestate} enheder|"></span>
                                </p>
                                <div class="progress progress-mini" th:if="${orgUnit.verifiedAt == null}">
                                    <div class="progress-bar" th:style="'width:' + ( ${orgUnit.totalNumber + orgUnit.orgUnitTotalNumber} == 0 ? '100' : (${(orgUnit.numberAttestated + orgUnit.getOrgUnitNumberAttestated) * 1.0} / ${orgUnit.totalNumber + orgUnit.orgUnitTotalNumber}) * 100.0 ) + '%;'" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                            </div>
                        </div>
                    </td>
                    <td th:text="${orgUnit.deadline}" th:class="${orgUnit.passedDeadline} ? 'passedDeadline' : ''"></td>
                    <td style="text-align: center;">
                        <span th:if="${orgUnit.performedBy != null}" class="label label-primary" th:text="|#{attestationmodule.html.dashboard.performedby.badge} ${orgUnit.performedBy}|"></span>
                        <span th:if="${orgUnit.performedBy == null && orgUnit.verifiedAt == null && orgUnit.readOnly}" class="label label-warning" th:text="#{attestationmodule.html.dashboard.awaiting.other.party}"></span>
                        <a th:if="${orgUnit.verifiedAt != null}" sec:authorize="hasRole('ROLE_MANAGER') or hasRole('ROLE_SUBSTITUTE') or hasRole('ROLE_ADMINISTRATOR') or hasRole('ROLE_ATTESTATION_ADMINISTRATOR')"
                           th:href="@{${'/ui/attestation/v2/orgunits/' + orgUnit.id}}">
                            <em style="color: #212529" class="fa fa-eye"></em>
                        </a>
                        <a th:unless="${orgUnit.verifiedAt != null} OR ${orgUnit.readOnly} OR (${orgUnit.numberAttestated == orgUnit.totalNumber} AND ${orgUnit.orgUnitNumberToAttestate == 0})"
                           sec:authorize="hasRole('ROLE_MANAGER') or hasRole('ROLE_SUBSTITUTE')"
                           th:href="@{${'/ui/attestation/v2/orgunits/' + orgUnit.id}}">
                            <em style="color: #212529" class="fa fa-pencil"></em>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <h3 th:text="#{attestationmodule.html.dashboard.itsystems}" th:unless="${#lists.isEmpty(itSystems)}"></h3>
    <div class="table-responsive" th:unless="${#lists.isEmpty(itSystems)}">
        <table th:id="${'dashboardItSystems_' + runId}" th:class="${'dashboardTable_' + runId + ' table table-striped table-bordered table-hover'}" style="padding-right:0px !important;">
            <thead>
                <tr>
                    <th th:text="#{attestationmodule.html.dashboard.itsystems.name}"></th>
                    <th class="progressColumn" th:text="#{attestationmodule.html.dashboard.status}"></th>
                    <th class="dateColumn" th:text="#{attestationmodule.html.dashboard.deadline}"></th>
                    <th class="actionColumn" th:text="#{html.control.operations}"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="system : ${itSystems}">
                    <td th:text="${system.name}"></td>
                    <td>
                        <p th:if="${system.verifiedAt != null || system.numberToAttestate == 0}" th:text="#{attestationmodule.html.dashboard.completed}"></p>
                        <p th:if="${system.verifiedAt == null && system.numberToAttestate != 0}" th:text="#{attestationmodule.html.dashboard.itsystems.progress(${system.numberToAttestate})}"></p>
                        <div class="progress progress-mini" th:if="${system.verifiedAt == null}">
                            <div class="progress-bar" th:style="'width:' + ( ${system.totalNumber} == 0 ? '0' : (${system.numberAttestated * 1.0} / ${system.totalNumber}) * 100.0 ) + '%;'" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                    </td>
                    <td th:text="${system.deadline}" th:class="${system.passedDeadline} ? 'passedDeadline' : ''"></td>
                    <td style="text-align: center;">
                        <span th:if="${system.performedBy != null}" class="label label-primary" th:text="|#{attestationmodule.html.dashboard.performedby.badge} ${system.performedBy}|"></span>
                        <a th:if="${system.verifiedAt != null}" sec:authorize="hasRole('ROLE_IT_SYSTEM_RESPONSIBLE')"
                           th:href="@{${'/ui/attestation/v2/itsystems/' + system.id}}">
                            <em style="color: #212529" class="fa fa-eye"></em>
                        </a>
                        <a th:unless="${system.verifiedAt != null} OR ${system.numberAttestated == system.totalNumber}" sec:authorize="hasRole('ROLE_IT_SYSTEM_RESPONSIBLE')"
                           th:href="@{${'/ui/attestation/v2/itsystems/' + system.id}}">
                            <em style="color: #212529" class="fa fa-pencil"></em>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <h3 th:text="#{attestationmodule.html.dashboard.itsystems.assignments}" th:unless="${#lists.isEmpty(itSystemsForRoleAssignmentAttestation)}"></h3>
    <div class="table-responsive" th:unless="${#lists.isEmpty(itSystemsForRoleAssignmentAttestation)}">
        <table th:id="${'dashboardItSystemsRoles_' + runId}" th:class="${'dashboardTable_' + runId + ' table table-striped table-bordered table-hover'}" style="padding-right:0px !important;">
            <thead>
                <tr>
                    <th th:text="#{attestationmodule.html.dashboard.itsystems.name}"></th>
                    <th class="progressColumn" th:text="#{attestationmodule.html.dashboard.status}" style="max-width: 40em"></th>
                    <th class="dateColumn" th:text="#{attestationmodule.html.dashboard.deadline}"></th>
                    <th class="actionColumn" th:text="#{html.control.operations}"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="system : ${itSystemsForRoleAssignmentAttestation}">
                    <td th:text="${system.name}"></td>
                    <td>
                        <div class="row">
                            <div class="col-lg-12">
                                <p th:if="${system.verifiedAt != null || (system.orgUnitNumberToAttestate == 0 && system.numberToAttestate == 0)}" th:text="#{attestationmodule.html.dashboard.completed}"></p>
                                <p th:if="${system.verifiedAt == null && (system.orgUnitNumberToAttestate != 0 || system.numberToAttestate != 0)}">
                                    <span th:if="${system.numberToAttestate != 0}" th:text="|Mangler attestering for ${system.numberToAttestate} medarbejdere|"></span>
                                    <span th:if="${system.orgUnitNumberToAttestate != 0}" th:text="${system.numberToAttestate != 0} ? | og ${system.orgUnitNumberToAttestate} enheder| : |Mangler attestering for ${system.orgUnitNumberToAttestate} enheder|"></span>
                                </p>
                                <div class="progress progress-mini" th:if="${system.verifiedAt == null}">
                                    <div class="progress-bar" th:style="'width:' + ( ${system.totalNumber + system.orgUnitTotalNumber} == 0 ? '100' : (${(system.numberAttestated + system.getOrgUnitNumberAttestated) * 1.0} / ${system.totalNumber + system.orgUnitTotalNumber}) * 100.0 ) + '%;'" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                            </div>
                        </div>
                    </td>
                    <td th:text="${system.deadline}" th:class="${system.passedDeadline} ? 'passedDeadline' : ''"></td>
                    <td style="text-align: center;">
                        <span th:if="${system.performedBy != null}" class="label label-primary" th:text="|#{attestationmodule.html.dashboard.performedby.badge} ${system.performedBy}|"></span>
                        <a th:if="${system.verifiedAt != null}" sec:authorize="hasRole('ROLE_IT_SYSTEM_RESPONSIBLE')"
                           th:href="@{${'/ui/attestation/v2/itsystems/' + system.id + '/roleassignments'}}">
                            <em style="color: #212529" class="fa fa-eye"></em>
                        </a>
                        <a th:unless="${system.verifiedAt != null} OR (${system.numberAttestated == system.totalNumber} AND ${system.orgUnitNumberToAttestate == 0})"
                           sec:authorize="hasRole('ROLE_IT_SYSTEM_RESPONSIBLE')"
                           th:href="@{${'/ui/attestation/v2/itsystems/' + system.id + '/roleassignments'}}">
                            <em style="color: #212529" class="fa fa-pencil"></em>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <h3 th:text="#{attestationmodule.html.dashboard.managerdelegates}" th:unless="${#lists.isEmpty(managerDelegateAttestations)}"></h3>
    <div class="table-responsive" th:unless="${#lists.isEmpty(managerDelegateAttestations)}">
        <table th:id="${'dashboardManagerDelegates_' + runId}" th:class="${'dashboardTable_' + runId + ' table table-striped table-bordered table-hover'}" style="padding-right:0px !important;">
            <thead>
                <tr>
                    <th th:text="#{attestationmodule.html.dashboard.orgunits.name}"></th>
                    <th th:text="#{attestationmodule.html.dashboard.orgunits.delegatedmanager}"></th>
                    <th class="progressColumn" th:text="#{attestationmodule.html.dashboard.status}" style="max-width: 40em"></th>
                    <th class="dateColumn" th:text="#{attestationmodule.html.dashboard.deadline}"></th>
                    <th class="actionColumn" th:text="#{html.control.operations}"></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="orgUnit : ${managerDelegateAttestations}">
                    <td th:text="${orgUnit.name}"></td>
                    <td>
                        <ul style="padding-left: 15px;">
                            <li th:each="managerName : ${orgUnit.managerNames}" th:text="${managerName}"></li>
                        </ul>
                    </td>
                    <td>
                        <div class="row">
                            <div class="col-lg-12">
                                <p th:if="${orgUnit.verifiedAt != null || (orgUnit.orgUnitNumberToAttestate == 0 && orgUnit.numberToAttestate == 0)}" th:text="#{attestationmodule.html.dashboard.completed}"></p>
                                <p th:if="${orgUnit.verifiedAt == null && (orgUnit.orgUnitNumberToAttestate != 0 || orgUnit.numberToAttestate != 0)}">
                                    <span th:if="${orgUnit.numberToAttestate != 0}" th:text="|Mangler attestering for ${orgUnit.numberToAttestate} medarbejdere|"></span>
                                    <span th:if="${orgUnit.orgUnitNumberToAttestate != 0}" th:text="${orgUnit.numberToAttestate != 0} ? | og ${orgUnit.orgUnitNumberToAttestate} enheder| : |Mangler attestering for ${orgUnit.orgUnitNumberToAttestate} enheder|"></span>
                                </p>
                                <div class="progress progress-mini" th:if="${orgUnit.verifiedAt == null}">
                                    <div class="progress-bar" th:style="'width:' + ( ${orgUnit.totalNumber + orgUnit.orgUnitTotalNumber} == 0 ? '100' : (${(orgUnit.numberAttestated + orgUnit.getOrgUnitNumberAttestated) * 1.0} / ${orgUnit.totalNumber + orgUnit.orgUnitTotalNumber}) * 100.0 ) + '%;'" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                            </div>
                        </div>
                    </td>
                    <td th:text="${orgUnit.deadline}" th:class="${orgUnit.passedDeadline} ? 'passedDeadline' : ''"></td>
                    <td style="text-align: center;">
                        <span th:if="${orgUnit.performedBy != null}" class="label label-primary" th:text="|#{attestationmodule.html.dashboard.performedby.badge} ${orgUnit.performedBy}|"></span>
                        <span th:if="${orgUnit.performedBy == null && orgUnit.verifiedAt == null && orgUnit.readOnly}" class="label label-warning" th:text="#{attestationmodule.html.dashboard.awaiting.other.party}"></span>
                        <a th:if="${orgUnit.verifiedAt != null}" sec:authorize="hasRole('ROLE_MANAGER') or hasRole('ROLE_SUBSTITUTE') or hasRole('ROLE_ADMINISTRATOR') or hasRole('ROLE_ATTESTATION_ADMINISTRATOR')"
                           th:href="@{${'/ui/attestation/v2/orgunits/' + orgUnit.id + '/managerdelegate'}}">
                            <em style="color: #212529" class="fa fa-eye"></em>
                        </a>
                        <a th:unless="${orgUnit.verifiedAt != null} OR ${orgUnit.readOnly} OR (${orgUnit.numberAttestated == orgUnit.totalNumber} AND ${orgUnit.orgUnitNumberToAttestate == 0})"
                           sec:authorize="hasRole('ROLE_MANAGER') or hasRole('ROLE_SUBSTITUTE')"
                           th:href="@{${'/ui/attestation/v2/orgunits/' + orgUnit.id + '/managerdelegate'}}">
                            <em style="color: #212529" class="fa fa-pencil"></em>
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
