<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header (customTitle='Bruger ikke fundet')}"></head>
<body class="layout-fixed">
<div class="wrapper">
	<header th:replace="~{fragments/navbar :: navbar-header-unauthenticated}"></header>

	<section>
		<div class="content-wrapper">
			<h3>
				<span th:text="${errorTitle} ?: 'Bruger ikke fundet'"></span>
			</h3>

			<div class="panel panel-default">
				<div class="panel-heading"></div>
				<div class="panel-body">
					<div class="alert alert-warning" role="alert">
						<h4 class="alert-heading">Adgang nægtet</h4>
						<p th:text="${errorMessage} ?: 'Din bruger er ikke registreret i systemet.'"></p>
					</div>

					<div class="well well-lg mt-4">
						<h4><strong>Hvad betyder dette?</strong></h4>
						<p>
							Din bruger findes ikke i systemet.
						</p>

						<h4 class="mt-3"><strong>Hvad skal du gøre?</strong></h4>
						<p>
							Kontakt din systemadministrator og bed dem om at blive oprettet.
						</p>

						<p class="text-muted mt-3" th:if="${username}">
							<strong>Brugernavn:</strong> <code th:text="${username}"></code>
						</p>
					</div>

					<div class="mt-4">
						<a href="/" class="btn btn-primary">Tilbage til login</a>
					</div>
				</div>
			</div>
		</div>
	</section>
</div>

<nav th:replace="~{fragments/footer :: footer}"></nav>
</body>
</html>
