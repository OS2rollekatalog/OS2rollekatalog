<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: header (title=#{html.setting.title})}"></head>
<body>
<div class="wrapper">
    <header th:replace="~{fragments/navbar :: navbar-header(subpage = 'administration')}"></header>
    <aside th:replace="~{fragments/navbar :: navbar-aside (page = 'requestSettings', subpage = 'administration')}"></aside>

    <section>
        <div class="content-wrapper">
            <h3 th:text="#{html.setting.rolerequest.title}"></h3>
            <form id="setting-form" class="form-horizontal" method="post" th:action="@{/ui/settings/rolerequest}"
                  th:object="${settingsForm}">
				<input type="hidden" th:field="*{onlyRecommendRoles}" />
				<input type="hidden" th:field="*{showSingleTableInRequestApproveEnabled}" />
				<div class="panel panel-default" style="padding-left: 20px; padding-right: 20px;">

                    <!-- REQUESTER SETTINGS -->
                    <div class="panel-heading">
                        <h4 th:text="#{html.setting.rolerequest.request.title}"></h4>
                    </div>

                    <div class="panel-body">
						<fieldset>
							<div class="form-group">
								<label class="col-sm-3 control-label" th:text="#{html.setting.requestapprove.servicedesk}"></label>
								<div class="col-sm-8">
									<input th:field="*{servicedeskEmail}" class="form-control" />
								</div>
								<a th:replace="~{fragments/help :: help (title=#{html.help.servicedesk.email.title}, content=#{html.help.servicedesk.email.body})}"></a>
							</div>
						</fieldset>
                        <fieldset>
                            <div class="form-group">
                                <label class="col-sm-3 control-label pt-1"
                                       th:text="#{html.setting.rolerequest.request.requester.label}"
                                       style="padding-top:0;"></label>
								<div class="col-sm-8">
									<div style="margin-bottom: 10px;" th:each="requestOpt : ${T(dk.digitalidentity.rc.rolerequest.model.enums.RequestableBy).values()}"
										 class="row gap-2 d-flex">
										<th:block th:unless="${requestOpt.name() == 'INHERIT'}">
											<input th:id="${'request_'+ requestOpt}" class="i-checks requesterSetting" type="checkbox"
												   th:value="${requestOpt}" name="approver" style="width:3rem;"
												   th:field="*{requestableByList}" th:data-id="${requestOpt}" onchange="onRequesterCheckBoxClick(this)">
											<label th:for="${'request_'+ requestOpt}" style="margin-bottom: 0"
												   th:text="#{__${requestOpt.message}__}"></label>
										</th:block>
									</div>
								</div>
                            </div>
                        </fieldset>

                        <fieldset>
                            <div class="form-group">
                                <label class="col-sm-3 control-label pt-1"
                                       th:text="#{html.setting.rolerequest.request.reason.label}"
                                       style="padding-top:0px;"></label>
                                <div class="col-sm-8">
                                    <div  th:each="requestOpt : ${T(dk.digitalidentity.rc.rolerequest.model.enums.ReasonOption).values()}"
                                         class="row">
                                        <input th:id="${'reason_'+requestOpt}" class="i-checks" type="radio"
                                               th:value="${requestOpt}" name="reason" style="width:3rem;"
                                               th:field="*{reasonSetting}">
                                        <label th:for="${'reason_'+requestOpt}" class=""
                                               th:text="#{__${requestOpt.getMessage()}__}"></label>
                                    </div>

                                </div>
                            </div>
                        </fieldset>

						<fieldset>
							<div class="form-group">
								<label class="col-sm-3 control-label pt-1"
									   th:text="#{html.setting.rolerequest.request.onlyRecommendRoles.label}"
									   style="padding-top:0px;"></label>
								<div class="col-sm-8 row">
									<div class="checkbox c-checkbox">
										<label>
											<input id="onlyRecommendRolesCheckbox" type="checkbox" th:attr="checked=${settingsForm.onlyRecommendRoles}" />
											<span class="fa fa-check"></span>
										</label>
										<a th:replace="~{fragments/help :: help (title=#{html.setting.rolerequest.request.onlyRecommendRoles.label}, content=#{html.setting.rolerequest.request.onlyRecommendRoles.explainer})}"></a>
									</div>
								</div>
							</div>
						</fieldset>
						<fieldset>
							<div class="form-group">
								<label class="col-sm-3 control-label" th:text="#{html.setting.showSingleTableInRequestApproveEnabled.enabled}"></label>
								<div class="col-sm-8 row">
									<div class="checkbox c-checkbox">
										<label>
											<input id="single-table-checkbox" type="checkbox" th:attr="checked=${settingsForm.showSingleTableInRequestApproveEnabled}" />
											<span class="fa fa-check"></span>
										</label>
									</div>
								</div>
							</div>
						</fieldset>
                    </div>
                </div>


                <!-- APPROVER SETTINGS -->
                <div class="panel panel-default" style="padding-left: 20px; padding-right: 20px;">
                    <div class="panel-heading">
                        <h4 th:text="#{html.setting.rolerequest.approve.title}"></h4>
                    </div>

                    <div class="panel-body">
                        <fieldset>
                            <div class="form-group">
                                <label class="col-sm-3 control-label pt-0"
                                       th:text="#{html.setting.rolerequest.approve.approver.label}"
                                       style="padding-top:0px;"></label>
								<div class="col-sm-8">
									<div style="margin-bottom: 10px;" th:each="approverOpt : ${T(dk.digitalidentity.rc.rolerequest.model.enums.ApprovableBy).values()}"
										 class="row gap-2 d-flex">
										<th:block th:unless="${approverOpt.name() == 'INHERIT'}">
											<input th:id="${'approver_'+ approverOpt}" class="i-checks approverSetting" type="checkbox"
												   th:value="${approverOpt}" name="approver" style="width:3rem;"
												   th:field="*{approvableByList}" th:data-id="${approverOpt}" onchange="onApproverCheckboxClick(this)">
											<label th:for="${'approver_'+ approverOpt}" style="margin-bottom: 0"
												   th:text="#{__${approverOpt.message}__}"></label>
											<div th:if="#{__${approverOpt.message}__} != ''" class="font-weight-light" style="margin-left: 32px; margin-bottom: 10px" th:text="#{__${approverOpt.message}__}"></div>
											<div class="role-request-email" th:id="${'approver_' + approverOpt + '_email'}" style="margin-left: 32px;">
												<div style="display: flex; align-items: center; gap: 8px;">
													<th:block th:unless="${#lists.contains({'AUTHRESPONSIBLE', 'MANAGERORSUBSTITUTE'}, approverOpt.name())}">
														<div class="checkbox c-checkbox" style="margin: 0; flex-shrink: 0;">
															<label style="margin: 0;">
																<input class="checkbox-email"
																	   th:data-name="${approverOpt.name}"
																	   type="checkbox"
																	   onchange="onEmailCheckboxClick(this)"
																	   th:checked="${settingsForm.alternativeEmails != null && settingsForm.alternativeEmails.containsKey(approverOpt) && !#strings.isEmpty(settingsForm.alternativeEmails.get(approverOpt))}" />
																<span class="fa fa-check"></span>
															</label>
														</div>
														<label class="mb-0" th:text="#{html.setting.rolerequest.constraint.create.send}"></label>
														<input type="text"
															   th:id="${'approverEmail_' + approverOpt.name}"
															   class="form-control inputEmailField"
															   style="max-width: 400px;"
															   th:placeholder="#{html.setting.rolerequest.constraint.create.email}"
															   th:value="${settingsForm.alternativeEmails != null && settingsForm.alternativeEmails.containsKey(approverOpt) ? settingsForm.alternativeEmails.get(approverOpt) : ''}"
															   th:name="'alternativeEmails[' + ${approverOpt} + ']'"
															   th:disabled="${settingsForm.alternativeEmails == null || !settingsForm.alternativeEmails.containsKey(approverOpt) || #strings.isEmpty(settingsForm.alternativeEmails.get(approverOpt))}" />
													</th:block>
												</div>
											</div>
										</th:block>
									</div>
								</div>
                            </div>
                        </fieldset>
                    </div>
                </div>


                <!-- CONSTRAINT  LIST SETTINGS -->
                <div class="panel panel-default" style="padding-left: 20px; padding-right: 20px;">
                    <div class="panel-heading">
                        <h4 th:text="#{html.setting.rolerequest.constraint.title}"></h4>
                    </div>

                    <div class="panel-body">
                        <fieldset>
                            <div class="form-group">
                                <label class="col-sm-3 control-label pt-0"
                                       th:text="#{html.setting.rolerequest.constraint.label}"
                                       style="padding-top:0px;"></label>
                                <div class="col-sm-8">
                                    <div class="" style="display:flex; margin-left:-15px; margin-right:-15px; gap:1rem; align-items:center; margin-bottom:1rem;">


                                            <input id="constraintCreationInput" type="text" class="form-control"
                                                   th:placeholder="#{html.setting.rolerequest.constraint.create.placeholder}">

                                            <button id="createConstraintBtn" type="button"
                                                    class="btn btn-primary btn-lg">
                                                <em class="fa fa-plus-circle"></em>
                                                <span th:text="#{html.setting.rolerequest.constraint.create}"></span>
                                            </button>

                                    </div>

                                    <div class="row">
                                        <select id="constraintList" class="form-control" multiple>
                                            <option th:each="constraint : *{constraints}"
                                                    th:value="${constraint.id}"
                                                    th:text="${constraint.value}"></option>
                                        </select>
                                    </div>

                                    <div class="row">
                                        <button id="deleteConstraintBtn" type="button"
                                                class="btn btn-primary btn-lg pull-right" style="margin-top:1rem;">
                                            <em class="fa fa-times"></em>
                                            <span th:text="#{html.setting.rolerequest.constraint.delete}"></span>
                                        </button>
                                    </div>


                                </div>
                            </div>
                        </fieldset>
                    </div>
                </div>

                <div class="panel panel-default" style="padding-left: 20px; padding-right: 20px;">
                    <div class="panel-heading"></div>
                    <div class="panel-body">
                        <fieldset>
                            <div class="form-group">
                                <div class="col-md-offset-1 col-md-10">
                                    <button type="submit" class="btn btn-primary btn-block"
                                            th:text="#{html.control.button.save}"></button>
                                </div>
                            </div>
                        </fieldset>
                    </div>
                </div>
            </form>
        </div>
    </section>
</div>

<div th:replace="~{fragments/footer :: footer}"></div>
<script th:replace="~{fragments/assignDatePicker :: content}"></script>


<style>
    .error {
        color: red;
    }
</style>

<script th:src="@{/js/rolerequest/settings.js}"></script>
<link rel="stylesheet" th:href="@{/css/rolerequestsettings.css}" />
</body>
</html>
