<!DOCTYPE html>
<html>
<head th:replace="~{fragments/header :: header (title=#{html.page.log.audit.title})}"></head>
<body class="layout-fixed">
	<div class="wrapper">
		<header th:replace="~{fragments/navbar :: navbar-header(subpage = 'reports')}"></header>
		<aside th:replace="~{fragments/navbar :: navbar-aside (page = 'log.audit', subpage = 'reports')}"></aside>

		<section>
			<div class="content-wrapper">
				<h3>
					<span th:text="#{html.page.log.audit.title}"></span>
				</h3>

				<div class="panel panel-default">
					<div class="panel-heading">
						<a id="downloadBtn" class="btn btn-primary btn-lg">
							<em class="fa fa-fw fa-download"></em> &nbsp;
							<span th:text="#{html.word.download}"></span>
						</a>
						<button id="clearEntityFilter" class="btn btn-warning btn-lg hidden">
							<em class="fa fa-times"></em> &nbsp;Ryd objektfilter
						</button>
					</div>

					<div class="panel-body">
						<div class="table-responsive">
							<table class="table table-striped table-hover listTable">
								<thead>
									<tr>
										<th class="col-md-1" th:text="#{html.page.log.timestamp}"></th>
										<th class="col-md-1" th:text="#{html.page.log.auditor}"></th>
										<th class="col-md-3" th:text="#{html.page.log.event}"></th>
										<th class="col-md-3" th:text="#{html.page.log.target}"></th>
										<th class="col-md-2" th:text="#{html.page.log.change}"></th>
										<th class="col-md-2" th:text="#{html.page.log.details}"></th>
									</tr>
								</thead>
								<tfoot style="display: table-header-group">
									<tr>
										<td class="input-filter"><input type="text" class="form-control input-sm" placeholder="Søg" /></td>
										<td class="input-filter"><input type="text" class="form-control input-sm" placeholder="Søg" /></td>
										<td class="input-filter">
											<select id="eventTypeFilter" class="form-control input-sm" multiple="multiple">
												<option th:each="logAction : ${T(dk.digitalidentity.rc.dao.model.enums.EventType).values()}"
														th:if="${!#strings.isEmpty(logAction.message)}"
														th:value="${logAction.name()}"
														th:text="${#messages.msg(logAction.message)}">
												</option>
											</select>
										</td>
										<td class="input-filter"><input type="text" class="form-control input-sm" placeholder="Søg" /></td>
										<td class="input-filter"><input type="text" class="form-control input-sm" placeholder="Søg" /></td>
										<td class="input-filter"><input type="text" class="form-control input-sm" placeholder="Søg" /></td>
									</tr>
								</tfoot>

								<tbody>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</section>
	</div>

	<nav th:replace="~{fragments/footer :: footer}"></nav>

	<script th:inline="javascript">
	/*<![CDATA[*/
		var token = $("meta[name='_csrf']").attr("content");
		/*[+
			var searchTxt = [[#{html.datatables.search}]];
			var dropdownTxt = [[#{html.datatables.dropdown}]];
			var infoDefaultTxt = [[#{html.datatables.info.default}]];
			var infoEmptyTxt = [[#{html.datatables.info.empty}]];
			var infoFilteredTxt = [[#{html.datatables.info.filtered}]];
			var prevTxt = [[#{html.datatables.prev}]];
			var nextTxt = [[#{html.datatables.next}]];
			var ajaxUrl = [[@{/rest/logs/audit}]];
			const auditLogDownloadUrl = [[@{/ui/logs/audit/download}]];
		+]*/

		let auditLogTable;
		let entityFilter = null; // { entityType, entityId }

		$(document).ready(function() {

			$('#downloadBtn').on('click', function () {
				const $btn = $(this);
				$btn.prop('disabled', true).text('Downloader...');

				$.ajax({
					url: auditLogDownloadUrl,
					method: 'GET',
					xhrFields: {
						responseType: 'blob'
					},
					success: function (data, status, xhr) {
						const contentType = xhr.getResponseHeader('Content-Type') || 'application/octet-stream';
						const blob = new Blob([data], { type: contentType });
						const url = URL.createObjectURL(blob);

						const a = document.createElement('a');
						a.href = url;
						a.download = 'auditlog.xlsx';
						document.body.appendChild(a);
						a.click();
						document.body.removeChild(a);
						URL.revokeObjectURL(url);
					},
					error: errorHandler("Fejl ved download"),
					complete: () => {
						$btn.prop('disabled', false).text('Download Excel');
					}
				});
			});

			auditLogTable = $('.listTable').DataTable({
				destroy: true,
				searchDelay: 1000,
				'ajax': function(data, callback, settings) {
					const selected = $('#eventTypeFilter').val();
					const params = [];
					if (selected && selected.length > 0) {
						selected.forEach(v => params.push('eventTypes=' + encodeURIComponent(v)));
					}
					if (entityFilter) {
						params.push('entityType=' + encodeURIComponent(entityFilter.entityType));
						params.push('entityId=' + encodeURIComponent(entityFilter.entityId));
					}
					const url = params.length > 0 ? ajaxUrl + '?' + params.join('&') : ajaxUrl;
					$.ajax({
						url: url,
						type: 'POST',
						contentType: 'application/json',
						headers: { 'X-CSRF-TOKEN': token },
						data: JSON.stringify(data),
						success: callback
					});
				},
				'serverSide' : true,
				columns : [{
					data : 'timestamp',
					render: function (data, type, row, meta) {
						return moment(new Date(data)).format("YYYY-MM-DD HH:mm")
					}
				}, {
					data : 'username'
				}, {
					data : 'eventType'
				}, {
					data : 'entityName',
					render: function (data, type, row, meta) {
						const cell = $('<span>');
						$('<button>', {
							'class': 'btn btn-xs btn-default entity-filter-btn',
							'title': 'Vis historik for dette objekt',
							'data-entity-type': row.entityTypeRaw || '',
							'data-entity-id': row.entityId || '',
							'html': '<em class="fa fa-search"></em>'
						}).appendTo(cell);
						$('<span>').text(' ' + (data || '') + ' (' + (row.entityType || '') + ')').appendTo(cell);
						return cell.prop('outerHTML');
					}
				}, {
					data : 'secondaryEntityName'
				}, {
					data: 'description',
					className: "preformat"
				}],
				order: [], // Tom array = ingen initial sortering
				'paging':    true,
				'ordering':  true,
				'stateSave': true,
				'info':      true,
				'pageLength': 25,
				// dom: lists the order of items we want to render
				dom: 'lrtip',
				'language': {
					"search":       searchTxt,
					"lengthMenu":   dropdownTxt,
					"info":         infoDefaultTxt,
					"zeroRecords":  infoEmptyTxt,
					"infoEmpty":    "",
					"infoFiltered": infoFilteredTxt,
					"paginate": {
						"next": nextTxt,
						"previous": prevTxt
					}
				}
			});

			$.each($('.input-filter', auditLogTable.table().footer()), function () {
				const column = auditLogTable.column($(this).index());

				$('input', this).on('keyup change', function () {
					if (column.search() !== this.value) {
						column.search(this.value).draw();
					}
				});
			});

			$('#eventTypeFilter').select2({
				placeholder: 'Alle',
				allowClear: true,
				width: '100%'
			}).on('change', function () {
				auditLogTable.draw();
			});

			$(document).on('click', '.entity-filter-btn', function () {
				entityFilter = {
					entityType: $(this).data('entity-type'),
					entityId: String($(this).data('entity-id'))
				};
				$('#clearEntityFilter').removeClass('hidden');
				auditLogTable.draw();
			});

			$('#clearEntityFilter').on('click', function () {
				entityFilter = null;
				$(this).addClass('hidden');
				auditLogTable.draw();
			});
		});
	/*]]>*/
	</script>
</body>
</html>
