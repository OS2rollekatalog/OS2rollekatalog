tests.username=rolunittest01
tests.password=Test1234

spring.flyway.table=schema_version
spring.flyway.locations=classpath:db/migration/mysql
di.simpleQueue.rate=600000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/rc_test?useSSL=false&serverTimezone=Europe/Copenhagen&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Test1234
spring.main.allow-circular-references=true
rc.substituteManagerAPI.enabled=true
rc.titles.enabled=true
rc.scheduled.enabled=false
rc.customer.cvr=12345678
rc.customer.apikey=Test1234
error.showtrace=true
# Increase timeout
spring.datasource.hikari.connection-timeout=60000
spring.jpa.properties.hibernate.jdbc.timeout=60
spring.aop.auto=false
# Disable background tasks
spring.task.scheduling.enabled=false

# Better transaction isolation
spring.jpa.properties.hibernate.connection.isolation=2

# enable SSL
server.ssl.enabled=true

# override default SAML configuration
di.saml.sp.baseUrl=https://host.testcontainers.internal:8090/
di.saml.sp.entityId=https://host.testcontainers.internal:8090

di.saml.keystore.location=classpath:samlKeystore.pfx
di.saml.keystore.password=Test1234
di.saml.idp.metadataLocation=classpath:test-idp-metadata.xml
di.saml.pages.nonsecured=/,/manage/**,/actuator/**,/error,/webjars/**,/css/**,/js/**,/img/**,/api/**,/download/**,/favicon.ico,/info,/debug,/vendor/**
