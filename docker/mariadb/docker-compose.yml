name: role-catalogue

services:
  db:
    image: mariadb:10.11
    container_name: db
    environment:
      MARIADB_DATABASE: 'rc'
      MARIADB_ROOT_PASSWORD: 'Test1234'
      TZ: 'Europe/Copenhagen'
    command: --default-time-zone=Europe/Copenhagen

    ports:
      - "3306:3306"
    expose:
      - '3306'
    volumes:
      - db:/var/lib/mysql

volumes:
  db:
