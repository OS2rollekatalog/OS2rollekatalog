variables:
  IMAGE_NAME: "rollekatalog"
  GIT_DEPTH: 0
  DOCKER_DRIVER: overlay2
  DOCKER_HOST: unix:///var/run/docker.sock
  TESTCONTAINERS_RYUK_CONTAINER_IP: "host-gateway"

include:
  - project: 'internal/devops/ci-templates'
    ref: '1.0.19'
    file: '/workflows/review.yml'

stages:
  - test
  - review

test-job:
  image:
    name: amazoncorretto:25-alpine
    pull_policy: if-not-present
  stage: test
  script:
    - apk add --no-cache fontconfig ttf-dejavu tar
    - ./mvnw -Dmaven.repo.local=.m2/repository -q spotless:check -pl ui
    - ./mvnw -Dmaven.repo.local=.m2/repository -q test
  cache:
    key: "$CI_PROJECT_ID-maven"
    paths:
      - .m2/repository
  only:
    - merge_requests
    - master
    - develop